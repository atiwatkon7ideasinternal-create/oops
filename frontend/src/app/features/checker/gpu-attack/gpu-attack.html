<app-header-public />

<main class="page">
  <h1 class="title">ตรวจสอบการถูกโจมตีด้วย GPU Attack</h1>
  <p class="note">** กรุณาเลือกรุ่น GPU เพื่อตรวจสอบระยะเวลาการถูกโจมตี **</p>

  <div class="form">
    <div class="input-row">
      <input
        type="password"
        class="pw-input"
        placeholder="Enter your password"
        [ngModel]="password()"
        (ngModelChange)="password.set($event)"
      />
      <select
        class="gpu-select"
        [ngModel]="gpu()"
        (ngModelChange)="gpu.set($event)"
      >
        @for (g of gpus(); track g) {
          <option [value]="g">{{ g }}</option>
        }
      </select>
    </div>

    <button type="button" class="btn-orange" (click)="check()" [disabled]="loading()">
      {{ loading() ? 'Checking...' : 'Check password' }}
    </button>

    @if (error()) {
      <p class="result unsafe">เกิดข้อผิดพลาด: {{ error() }}</p>
    }

    @if (result(); as r) {
      <p class="result" [class.safe]="r.safe" [class.unsafe]="!r.safe">
        ระยะเวลาในการถูกโจมตี : {{ r.time }}
      </p>
      @if (!r.safe) {
        <p class="info">กรุณาเปลี่ยนรหัสผ่านเพื่อความปลอดภัย</p>
      }
    }
  </div>
</main>
