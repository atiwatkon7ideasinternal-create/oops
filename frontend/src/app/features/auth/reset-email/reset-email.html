<main class="page">
  <div class="card">
    <h2 class="heading">Reset M-OTP</h2>
    <h1 class="logo">OOPS!</h1>

    <p class="prompt">กรุณากรอกอีเมลของคุณ เราจะส่งรหัสในการรีเซ็ตไปที่อีเมลของคุณ</p>

    <input
      class="input"
      placeholder="Enter email"
      type="email"
      [ngModel]="email()"
      (ngModelChange)="email.set($event)"
      (keyup.enter)="submit()"
    />
    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }
    <button class="btn-submit" (click)="submit()" [disabled]="loading()">
      {{ loading() ? 'กำลังส่ง...' : 'submit' }}
    </button>

    <a routerLink="/login" class="link">Forget email</a>
  </div>
</main>
