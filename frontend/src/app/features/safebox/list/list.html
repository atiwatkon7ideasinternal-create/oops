<app-header-app />

<div class="layout">
  <app-sidebar [activeGroup]="group()" />

  <main class="content">
    @if (loading()) {
      <p class="loading">กำลังโหลด...</p>
    } @else if (error()) {
      <p class="empty">{{ error() }}</p>
    } @else {
      <div class="grid">
        <a routerLink="/safebox/add" class="add-card" aria-label="เพิ่มรายการใหม่">
          <span class="plus">+</span>
          <span class="add-label">เพิ่มรายการ</span>
        </a>

        @for (tile of tiles(); track tile.appName) {
          <button type="button" class="app-card" [class.saved]="!!tile.vid" (click)="open(tile)">
            <span class="logo">{{ tile.appName.charAt(0).toUpperCase() }}</span>
            <span class="name">{{ tile.appName }}</span>
            @if (tile.vid) { <span class="badge">บันทึกแล้ว</span> }
          </button>
        }

        @if (tiles().length === 0) {
          <p class="empty">ยังไม่มีแอปในหมวด "{{ groupLabel() }}"</p>
        }
      </div>
    }
  </main>
</div>
