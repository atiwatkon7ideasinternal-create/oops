<main class="page">
  <div class="card">
    <h2 class="heading">Setup Authenticator</h2>
    <h1 class="logo">OOPS!</h1>

    <p class="prompt">สแกน QR code นี้ด้วยแอปพลิเคชัน Google Authenticator</p>
    <p class="prompt">แล้วกรอกรหัส 6 หลักด้านล่างเพื่อเข้าใช้งาน</p>

    @if (qr()) {
      <div class="qr"><img [src]="qr()" alt="OTP QR code" /></div>
      <p class="secret">หรือกรอก secret: <code>{{ secret() }}</code></p>
    } @else {
      <p class="form-error">ไม่พบ QR — กรุณา register ใหม่</p>
    }

    <input
      class="input"
      placeholder="กรอกรหัส 6 หลักจาก Authenticator"
      maxlength="6"
      inputmode="numeric"
      [ngModel]="token()"
      (ngModelChange)="token.set($event)"
      (keyup.enter)="confirm()"
    />
    @if (error()) {
      <p class="form-error">{{ error() }}</p>
    }
    <button type="button" class="btn-confirm" (click)="confirm()" [disabled]="loading()">
      {{ loading() ? 'กำลังยืนยัน...' : 'ยืนยันและเข้าสู่ระบบ' }}
    </button>

    <a routerLink="/" class="btn-back">กลับไปหน้าแรก</a>
  </div>
</main>
