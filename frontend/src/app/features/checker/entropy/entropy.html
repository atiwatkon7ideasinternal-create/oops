<app-header-public />

<main class="page">
  <h1 class="title">Entropy</h1>
  <p class="note">** กรอกรหัสผ่านของคุณเพื่อคำนวณค่า Entropy **</p>

  <input
    type="password"
    class="pw-input"
    placeholder="Enter your password"
    [ngModel]="password()"
    (ngModelChange)="password.set($event)"
    (keyup.enter)="check()"
  />

  <button type="button" class="btn-orange" (click)="check()" [disabled]="loading()">
    {{ loading() ? 'Checking...' : 'Check password' }}
  </button>

  @if (error()) {
    <p class="result unsafe">เกิดข้อผิดพลาด: {{ error() }}</p>
  }

  @if (result(); as r) {
    <p class="result" [class.safe]="r.safe" [class.unsafe]="!r.safe">
      ค่า Entropy ของคุณคือ {{ r.entropy }}
    </p>
    <p class="info">ความปลอดภัยของรหัสผ่าน : {{ r.level }}</p>
    @if (!r.safe) {
      <p class="info">กรุณาเปลี่ยนรหัสผ่านเพื่อความปลอดภัยสูงสุดของคุณ</p>
    }
  }
</main>
